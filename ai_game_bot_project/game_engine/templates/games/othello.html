<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Flip | AI Strategy</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00cec9;
            --accent: #e17055;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --black: #1e293b;
            --white: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 206, 201, 0.5);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .game-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
            width: 100%;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 5px;
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 2px solid var(--border);
        }

        .cell {
            width: 50px;
            height: 50px;
            background: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s;
            border-radius: 4px;
        }

        .cell.valid {
            background: rgba(0, 206, 201, 0.1);
            border: 1px dashed var(--primary);
        }

        .piece {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: transform 0.6s, background-color 0.6s;
            transform-style: preserve-3d;
        }

        .piece.black {
            background-color: var(--black);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .piece.white {
            background-color: var(--white);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .piece.flip {
            transform: rotateY(180deg);
        }

        .dashboard {
            width: 300px;
            background: var(--surface);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box.active {
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px rgba(0, 206, 201, 0.2);
        }

        .stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .stat-score {
            font-family: 'Orbitron';
            font-size: 1.5rem;
            color: var(--text);
        }

        select,
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 6px;
            font-family: 'Orbitron';
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        select {
            background: #1e293b;
            color: white;
            border: 1px solid var(--border);
        }

        button {
            background: linear-gradient(135deg, var(--primary), #0984e3);
            color: white;
            border: none;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 206, 201, 0.4);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .overlay h2 {
            font-family: 'Orbitron';
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <a href="{% url 'index' %}" class="back-link">← BACK TO HUB</a>
    <h1>CYBER FLIP</h1>

    <div class="game-container">
        <div class="board" id="board">
            <!-- 64 cells -->
        </div>

        <div class="dashboard">
            <div class="stat-grid">
                <div class="stat-box" id="stat1">
                    <div class="stat-label">USER (BLACK)</div>
                    <div class="stat-score" id="score1">2</div>
                </div>
                <div class="stat-box" id="stat2">
                    <div class="stat-label">AI (WHITE)</div>
                    <div class="stat-score" id="score2">2</div>
                </div>
            </div>

            <div class="status-box" style="text-align: center; margin-bottom: 20px;">
                <div class="stat-label">Turn Status</div>
                <div class="stat-score" id="turn-display" style="font-size: 1rem; color: var(--primary);">
                    INITIALIZING...</div>
            </div>

            <button onclick="startGame()">RESET BOARD</button>
            <p style="margin-top: 20px; font-size: 0.8rem; color: #94a3b8; text-align: center;">Click valid
                (highlighted) cells to flip opposing pieces.</p>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <h2 id="win-status">GRID SECURED</h2>
        <button onclick="startGame()" style="width: auto; padding: 15px 40px;">REBOOT</button>
    </div>

    <script>
        let gameActive = false;

        async function startGame() {
            const response = await fetch(`/start-game/?game=othello&mode=ai`);
            const data = await response.json();

            gameActive = true;
            document.getElementById('overlay').style.display = 'none';
            renderBoard(data);
        }

        async function makeMove(r, c) {
            if (!gameActive) return;
            const response = await fetch(`/step/?r=${r}&c=${c}`);
            const data = await response.json();

            renderBoard(data);

            if (data.game_over) {
                endGame(data.winner, data.scores);
            }
        }

        function renderBoard(state) {
            const grid = document.getElementById('board');
            grid.innerHTML = '';

            document.getElementById('score1').innerText = state.scores['1'];
            document.getElementById('score2').innerText = state.scores['2'];
            document.getElementById('turn-display').innerText = state.turn === 1 ? "YOUR TURN" : "AI PROCESSING...";

            document.getElementById('stat1').classList.toggle('active', state.turn === 1);
            document.getElementById('stat2').classList.toggle('active', state.turn === 2);

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    const val = state.board[r][c];
                    const isValid = state.valid_moves.some(m => m[0] === r && m[1] === c);

                    if (isValid) {
                        cell.classList.add('valid');
                        cell.onclick = () => makeMove(r, c);
                    }

                    if (val !== 0) {
                        const piece = document.createElement('div');
                        piece.className = `piece ${val === 1 ? 'black' : 'white'}`;
                        cell.appendChild(piece);
                    }
                    grid.appendChild(cell);
                }
            }
        }

        function endGame(winner, scores) {
            gameActive = false;
            const overlay = document.getElementById('overlay');
            const status = document.getElementById('win-status');

            if (scores['1'] > scores['2']) {
                status.innerText = 'USER DOMINANCE';
                status.style.color = 'var(--primary)';
            } else if (scores['2'] > scores['1']) {
                status.innerText = 'AI SUPERIORITY';
                status.style.color = 'var(--accent)';
            } else {
                status.innerText = 'PARITY REACHED';
                status.style.color = '#fff';
            }

            overlay.style.display = 'flex';
        }

        // Init
        startGame();
    </script>
</body>

</html>
