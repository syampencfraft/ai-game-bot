<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Fusion | AI Heuristics</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00cec9;
            --accent: #e17055;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 206, 201, 0.5);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .game-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
            width: 100%;
        }

        .grid-container {
            background: var(--surface);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 500px;
            height: 500px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            position: relative;
        }

        .cell {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            transition: all 0.15s ease-in-out;
        }

        /* Tile Colors */
        .tile-2 {
            background: #eee4da;
            color: #776e65;
        }

        .tile-4 {
            background: #ede0c8;
            color: #776e65;
        }

        .tile-8 {
            background: #f2b179;
            color: #f9f6f2;
        }

        .tile-16 {
            background: #f59563;
            color: #f9f6f2;
        }

        .tile-32 {
            background: #f67c5f;
            color: #f9f6f2;
        }

        .tile-64 {
            background: #f65e3b;
            color: #f9f6f2;
        }

        .tile-128 {
            background: #edcf72;
            color: #f9f6f2;
            font-size: 1.5rem;
        }

        .tile-256 {
            background: #edcc61;
            color: #f9f6f2;
            font-size: 1.5rem;
        }

        .tile-512 {
            background: #edc850;
            color: #f9f6f2;
            font-size: 1.5rem;
        }

        .tile-1024 {
            background: #edc53f;
            color: #f9f6f2;
            font-size: 1.2rem;
        }

        .tile-2048 {
            background: var(--primary);
            color: #f9f6f2;
            font-size: 1.2rem;
            box-shadow: 0 0 20px var(--primary);
        }

        .dashboard {
            width: 300px;
            background: var(--surface);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin-top: 5px;
        }

        select,
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        select {
            background: #1e293b;
            color: #fff;
            border: 1px solid var(--border);
        }

        button {
            background: linear-gradient(135deg, var(--primary), #0984e3);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 206, 201, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 206, 201, 0.5);
        }

        .back-link {
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .overlay h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        /* Settings CSS */
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 100;
        }

        .settings-btn:hover {
            color: var(--primary);
        }

        .settings-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--primary);
            z-index: 1010;
            display: none;
            width: 300px;
            backdrop-filter: blur(20px);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1005;
            display: none;
        }
    </style>
</head>

<body>
    <a href="{% url 'index' %}" class="back-link">← BACK TO HUB</a>

    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>

    <div class="modal-overlay" id="modal-overlay" onclick="toggleSettings()"></div>
    <div class="settings-modal" id="settings-modal">
        <h3 style="font-family: 'Orbitron'; color: var(--primary); margin-top: 0;">FUSION CONFIG</h3>

        <label>AI PROCESSING SPEED</label>
        <select id="ai-speed-select">
            <option value="500">STABILITY (500ms)</option>
            <option value="200" selected>BALANCED (200ms)</option>
            <option value="50">TURBO (50ms)</option>
        </select>

        <p style="margin-top: 20px; font-size: 0.8rem; color: #94a3b8;">Faster solving may cause visual desync but
            optimizes score generation rate.</p>

        <button onclick="toggleSettings()" style="margin-top: 20px; width: 100%;">APPLY</button>
    </div>

    <h1>2048 FUSION</h1>

    <div class="game-container">
        <div class="grid-container" id="grid">
            <!-- 16 cells -->
            <div class="cell" id="cell-0-0"></div>
            <div class="cell" id="cell-0-1"></div>
            <div class="cell" id="cell-0-2"></div>
            <div class="cell" id="cell-0-3"></div>
            <div class="cell" id="cell-1-0"></div>
            <div class="cell" id="cell-1-1"></div>
            <div class="cell" id="cell-1-2"></div>
            <div class="cell" id="cell-1-3"></div>
            <div class="cell" id="cell-2-0"></div>
            <div class="cell" id="cell-2-1"></div>
            <div class="cell" id="cell-2-2"></div>
            <div class="cell" id="cell-2-3"></div>
            <div class="cell" id="cell-3-0"></div>
            <div class="cell" id="cell-3-1"></div>
            <div class="cell" id="cell-3-2"></div>
            <div class="cell" id="cell-3-3"></div>

            <div class="overlay" id="overlay">
                <h2>OBLITERATED</h2>
                <button onclick="startGame()" style="width: auto; padding: 15px 40px;">REBOOT SYSTEM</button>
            </div>
        </div>

        <div class="dashboard">
            <div class="stat-card">
                <div class="status-label">CURRENT SCORE</div>
                <div class="status-value" id="score">0</div>
            </div>

            <div class="stat-card">
                <div class="status-label">BEST PERFORMANCE</div>
                <div class="status-value">{{ user_high_score }}</div>
            </div>

            <label style="font-size: 0.8rem; color: #94a3b8;">CONTROL OVERRIDE</label>
            <select id="mode-select">
                <option value="manual">MANUAL (KEYBOARD)</option>
                <option value="heuristic">HEURISTIC AI</option>
            </select>

            <button onclick="startGame()">INITIALIZE CORE</button>
            <p style="margin-top: 20px; font-size: 0.8rem; color: #94a3b8; text-align: center;">Use Arrow Keys to merge
                tiles in Manual mode.</p>
        </div>
    </div>

    <script>
        let gameActive = false;
        let aiInterval = null;

        async function startGame() {
            if (aiInterval) clearInterval(aiInterval);
            const mode = document.getElementById('mode-select').value;
            const response = await fetch(`/start-game/?game=2048&mode=${mode}`);
            const data = await response.json();

            gameActive = true;
            document.getElementById('overlay').style.display = 'none';
            updateGrid(data);

            if (mode === 'heuristic') {
                const aiSpeed = parseInt(document.getElementById('ai-speed-select').value);
                aiInterval = setInterval(gameStep, aiSpeed);
            }
        }

        async function gameStep(action = null) {
            if (!gameActive) return;

            let url = '/step/';
            if (action !== null) url += `?action=${action}`;

            const response = await fetch(url);
            const data = await response.json();

            updateGrid(data);

            if (data.game_over) {
                gameActive = false;
                if (aiInterval) clearInterval(aiInterval);
                document.getElementById('overlay').style.display = 'flex';
                saveFinalScore(data.score);
            }
        }

        function updateGrid(state) {
            document.getElementById('score').innerText = state.score;
            state.board.forEach((row, i) => {
                row.forEach((val, j) => {
                    const cell = document.getElementById(`cell-${i}-${j}`);
                    cell.innerText = val === 0 ? '' : val;
                    cell.className = 'cell' + (val !== 0 ? ` tile-${val}` : '');
                });
            });
        }

        document.addEventListener('keydown', (e) => {
            if (!gameActive || document.getElementById('mode-select').value !== 'manual') return;

            // 0: UP, 1: RIGHT, 2: DOWN, 3: LEFT
            if (e.key === 'ArrowUp') gameStep(0);
            else if (e.key === 'ArrowRight') gameStep(1);
            else if (e.key === 'ArrowDown') gameStep(2);
            else if (e.key === 'ArrowLeft') gameStep(3);
        });

        async function saveFinalScore(score) {
            await fetch('/save-score/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ score: score })
            });
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            const overlay = document.getElementById('modal-overlay');
            const isVisible = modal.style.display === 'block';
            modal.style.display = isVisible ? 'none' : 'block';
            overlay.style.display = isVisible ? 'none' : 'block';
        }

        // Initialize
        startGame();
    </script>
</body>

</html>
